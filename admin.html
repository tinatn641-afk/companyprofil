<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;

}

.login{

padding:40px;
box-shadow:0 0 20px rgba(0,0,0,.2);

}

input{

display:block;
margin:10px 0;
padding:10px;
width:250px;

}

</style>

</head>

<body>

<div class="login">

<h2>Admin Login</h2>

<input
id="user"
placeholder="Username">

<input
id="pass"
type="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

</div>

<script>

function login(){

let username=
document.getElementById(
"user"
).value;

let password=
document.getElementById(
"pass"
).value;

if(
username=="admin"
&&
password=="12345"
){

window.location=
"dashboard.html";

}else{

alert(
"Username atau password salah!"
);

}

}

</script>

</body>

</html>
